<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Travel Tales</title>
    <link rel="icon" href="Images/TT4.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="CSS/Contact.css">
</head>
<body>
    <div class="video-container">
    <video id="background-video" autoplay loop playsinline>
        <source src="Travel Tales Video.mp4" type="video/mp4">
    </video>
</div>

<script>
    document.addEventListener("click", function () {
        const video = document.getElementById("background-video");
        video.muted = false;
        video.play();
    });
</script>

    
    <!-- Decorative elements -->
    <div class="travel-decoration decoration-1"></div>
    <div class="travel-decoration decoration-2"></div>
    
    
    <div class="container">
        <div class="contact-form-container">
            <div class="logo">
                <img src="Images/TT5.png" alt="Travel Tales Logo" class="brand-logo">
                <p>Share your journey with the world</p>
            </div>

            
            <form class="contact-form" action="mailto:TravelTales@gmail.com" method="POST" enctype="text/plain">
    <h2>Contact Us</h2>

    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="yourname@example.com" required>
    </div>

    <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" required>
    </div>

    <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject" required>
            <option selected disabled>Select subject</option>
            <option value="general">General Inquiry</option>
            <option value="booking">Booking Related</option>
            <option value="packages">Travel Packages</option>
            <option value="support">Customer Support</option>
            <option value="feedback">Feedback</option>
        </select>
    </div>

    <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
    </div>

    <button type="submit" class="submit-btn">
        <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Send Message
    </button>
</form>

            
            <div class="social-links">
                <p>Follow our adventures</p>
                <div class="social-icons">
                    <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="#" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                    <a href="#" aria-label="Blog"><i class="fas fa-blog"></i></a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Video play promise to handle autoplay restrictions
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('background-video');
            
            // Try to play the video (muted by default)
            const playPromise = video.play();
            
            // If autoplay fails, show controls
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Autoplay prevented, showing controls");
                    video.controls = true;
                    video.muted = true;
                });
            }
            
            // Video aspect ratio handling
            function resizeVideo() {
                const containerRatio = window.innerWidth / window.innerHeight;
                const videoRatio = video.videoWidth / video.videoHeight;
                
                if (containerRatio > videoRatio) {
                    video.style.width = '100%';
                    video.style.height = 'auto';
                } else {
                    video.style.width = 'auto';
                    video.style.height = '100%';
                }
            }
            
            // Initial resize
            if (video.readyState > 0) {
                resizeVideo();
            } else {
                video.addEventListener('loadedmetadata', resizeVideo);
            }
            
            window.addEventListener('resize', resizeVideo);
        });
    </script>
</body>
</html>
