<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>
    <link rel="icon" type="image/logo" href="Images/TT4.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Services/CSS/Login.css">
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <h5>Not a member? <a href="Sign up Page.html">Register now</a></h5>
        <form action="/action_page.php" method="post">
            <img src="Images/TravelTales3.png" alt="User Image">
            <label for="uname">Username</label>
            <input type="text" placeholder="Enter Username" name="uname" id="uname" required>
            <label for="psw">Password</label>
            <input type="password" placeholder="Enter Password" name="psw" id="psw" required>
            
            <!-- Remember Me and Forgot Password -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 14px;">
                <label style="display: flex; align-items: center;">
                    <input type="checkbox" style="margin-right: 6px;"> Remember me
                </label>
                <a href="#" onclick="openPopup()" style="text-decoration: none; color: #fff;">Forgot Password?</a>
            </div>

<!-- Forgot Password Popup -->
<div id="popup" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: white; border: 1px solid #ccc; border-radius: 8px; padding: 20px; width: 300px; box-shadow: 0 0 15px rgba(0,0,0,0.2); z-index: 1000;">
  <h3 style="margin-top: 0;">Reset Password</h3>
  <p>Enter your email address:</p>
  <input type="email" placeholder="Email" style="width: 100%; padding: 8px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #ccc;">
  <button onclick="closePopup()" style="padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px;">Submit</button>
  <button onclick="closePopup()" style="padding: 8px 16px; margin-left: 10px; background: #ccc; color: black; border: none; border-radius: 4px;">Cancel</button>
</div>

<!-- Overlay Background -->
<div id="overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 999;"></div>

<!-- JavaScript -->
<script>
  function openPopup() {
    document.getElementById("popup").style.display = "block";
    document.getElementById("overlay").style.display = "block";
  }

  function closePopup() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("overlay").style.display = "none";
  }
</script>

            <br>
            <button type="submit">Login</button>
            <div>
                <p>Or</p>
                <p>Sign in with</p>
                <div class="social-buttons">
                    <a href="https://www.facebook.com/login.php/" aria-label="Facebook"><img src="Images/facebook.png" alt="Facebook Logo"></a>
                    <a href="https://accounts.google.com/" aria-label="Google"><img src="Images/googleplus.png" alt="Google Logo"></a>
                    <a href="https://x.com/i/flow/login?lang=en" aria-label="Twitter"><img src="Images/twitter.png" alt="Twitter Logo"></a>
                </div>
                <p>&copy; 2025 TravelTales. All Rights Reserved.</p>
            </div>
        </form>
    </div>
    <footer></footer>
</body>
</html>
